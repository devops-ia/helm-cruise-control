{{- if and .Values.ui.enabled ((.Values.ui.gateway).enabled) ((.Values.ui.gateway).create) -}}
{{- $root := . -}}
{{- $fullName := include "cruise-control.fullname" $root -}}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ $fullName }}-ui-gateway
  labels:
    {{- include "cruise-control.ui.labels" $root | nindent 4 }}
spec:
  gatewayClassName: {{ required "ui.gateway.className is required when ui.gateway.create is true" $root.Values.ui.gateway.className }}
  listeners:
    {{- toYaml $root.Values.ui.gateway.listeners | nindent 4 }}
{{- end }}
