{{- if and .Values.ui.enabled ((.Values.ui.gateway).enabled) -}}
{{- $root := . -}}
{{- $fullName := include "cruise-control.fullname" $root -}}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $fullName }}-ui
  labels:
    {{- include "cruise-control.ui.labels" $root | nindent 4 }}
  {{- with $root.Values.ui.gateway.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- if $root.Values.ui.gateway.create }}
    - name: {{ $fullName }}-ui-gateway
      namespace: {{ $root.Release.Namespace }}
    {{- else }}
    {{- toYaml $root.Values.ui.gateway.parentRefs | nindent 4 }}
    {{- end }}
  {{- if $root.Values.ui.gateway.hostnames }}
  hostnames:
    {{- toYaml $root.Values.ui.gateway.hostnames | nindent 4 }}
  {{- end }}
  rules:
    {{- range $root.Values.ui.gateway.rules }}
    - {{- if .matches }}
      matches:
        {{- toYaml .matches | nindent 8 }}
      {{- end }}
      {{- if .filters }}
      filters:
        {{- toYaml .filters | nindent 8 }}
      {{- end }}
      backendRefs:
        - name: {{ $fullName }}-ui
          port: {{ $root.Values.ui.service.port | default 80 }}
    {{- end }}
{{- end }}
